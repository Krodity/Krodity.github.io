<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <link rel="icon" type="image/png" href="Imgs/favicon.png">
    <link rel="stylesheet" href="styles2.css">
</head>
<body>

    
    <div class="profile">
        <div class="profile-picture">
            <img src="Imgs/vwall.jpg" alt="Profile Picture">
        </div>
        <p class="Krodity">Krodity</p>
    </div>

    <!-- Search bar -->
    <div class="search-container">
        <form action="https://www.google.com/search" method="GET" target="_blank">
            <input type="text" name="q" placeholder="Type to search..." required>
        </form>
    </div>

    <!-- YT Search -->
    <div class="yt-search-container">
        <form action="https://www.youtube.com/results" method="GET" target="_blank" class="yt-search">
            <input type="text" name="search_query" placeholder="Search YouTube..." required>
        </form>
    </div>

    <div class="quicklinks">
        <a href="https://www.youtube.com" target="_blank" class="quicklink youtube">YouTube</a>
        <a href="https://www.amazon.com" target="_blank" class="quicklink amazon">Amazon</a>
        <a href="https://www.crunchyroll.com" target="_blank" class="quicklink crunchy">Crunchy</a>
        <a href="https://www.freecodecamp.org" target="_blank" class="quicklink freecodecamp">FreeCodeCamp</a>
        <a href="https://localhost:47990/pin" target="_blank" class="quicklink sunshine">Sunshine</a>
    </div>

    <script>
        document.querySelector('.profile-picture').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
    </script>



</body>
</html>
